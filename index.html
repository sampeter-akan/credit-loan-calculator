<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Credit Loan Calculator</title>
    <link rel="stylesheet" href="styles/style.css">
</head>

<body>
    <div class="container">
        <h1>CONTOSO Credit Loan Calculator</h1>
        <form id="fv-form">
            <label for="monthly-payment">Monthly Payment ($):</label>
            <input type="number" id="monthly-payment" min="0" step="0.01" required>
            <label for="years">Number of Years:</label>
            <input type="number" id="years" min="1" step="1" required>
            <label for="interest-rate">Annual Interest Rate (%):</label>
            <input type="number" id="interest-rate" min="0" step="0.01" required>
            <button type="submit">Credit Loan Calculator</button>
        </form>
        <div class="result" id="result"></div>
    </div>
    <script src="scripts/main.js"></script>
</body>

</html>
